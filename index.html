<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="scene">
        <div class="wrapper">
            
            <div class="glass-card player-card">
                <div class="player-cover" id="cover"></div>
                <div class="player-meta">
                    <div id="track-title">Синхронизация...</div>
                </div>
                <div class="player-controls">
                    <button class="btn" onclick="sendPlayerCmd('prev')">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button class="btn btn-main" onclick="sendPlayerCmd('play_pause')" id="play-btn">
                        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button class="btn" onclick="sendPlayerCmd('next')">
                        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zm-10.5 0v12l8.5-6z"/></svg>
                    </button>
                </div>
            </div>

            <div class="top-row-container">
                <div class="glass-card weather-today">
                    <h3>ПОГОДА (СЕГОДНЯ)</h3>
                    <div class="temp" id="temp-today">--°C</div>
                </div>

                <div class="glass-card quick-actions-grid" id="quick-actions-grid">
                    <!-- кнопки загружаются динамически -->
                </div>
            </div>

            <div class="glass-card weather-week">
                <div class="weather-week-left">
                    <h3>ПОГОДА (НА 7 ДНЕЙ ВПЕРЁД)</h3>
                    <div class="week-list" id="temp-week">Загрузка...</div>
                </div>
                
                <div class="weather-week-right">
                    <div class="chart-header-row">
                        <h3 id="chart-title-asset">МОНИТОРИНГ: USD</h3>
                    </div>
                    
                    <div class="chart-container">
                        <div class="chart-floating-tooltip" id="chart-data-tooltip">--.--: --</div>

                        <div class="chart-main-area">
                            <div class="axis-y" id="chart-axis-y">
                                <span>--</span><span>--</span><span>--</span><span>--</span><span>--</span>
                            </div>
                            
                            <div class="chart-grid-lines" id="grid-lines-container" 
                                 onmousemove="handleChartHover(event)" 
                                 onmouseleave="handleChartLeave()">
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                <div class="grid-line"></div>
                                
                                <svg class="chart-svg" id="chart-svg-canvas" preserveAspectRatio="none">
                                    <path id="chart-path" d="" fill="none" stroke-width="3" stroke-linecap="round"/>
                                </svg>

                                <div class="chart-slider-line" id="slider-vertical-line"></div>
                            </div>
                        </div>
                        <div class="axis-x" id="chart-axis-x"></div>
                        
                        <div class="slider-wrapper">
                            <input type="range" id="chart-range-slider" min="0" max="14" value="14" oninput="updateSliderPosition()">
                        </div>
                    </div>
                </div>
            </div>

            <div class="glass-card notifications-card">
                <div class="clock-block">
                    <div class="clock-time" id="clock-time">00:00:00</div>
                    <div class="clock-date" id="clock-date">1 января 2000</div>
                </div>
                <h3>УВЕДОМЛЕНИЯ</h3>
                <div class="list-vertical" id="noti-list">Загрузка...</div>
            </div>

            <div class="ticker-panel currency-panel">
                <div class="ticker-wrap">
                    <div class="ticker speed-currency" id="currency-ticker"></div>
                    <div class="ticker speed-currency" id="currency-ticker-dup"></div>
                </div>
            </div>

            <div class="ticker-panel stock-panel">
                <div class="ticker-wrap">
                    <div class="ticker speed-stock" id="stock-ticker"></div>
                    <div class="ticker speed-stock" id="stock-ticker-dup"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const daysOfWeek = ["Воскресенье", "Понедельник", "Вторник", "Среда", "Четверг", "Пятница", "Суббота"];
        let allFinancialData = {}; 
        let serverDates = [];
        let activeAssetId = 'usd'; 

        /* АНИМАЦИЯ ФОНА */
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [];
        const dotsCount = 45;
        const maxDistance = 260;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        for (let i = 0; i < dotsCount; i++) {
            dots.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.25,
                vy: (Math.random() - 0.5) * 0.25,
                radius: Math.random() * 3 + 2.5
            });
        }

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < dotsCount; i++) {
                let d = dots[i];
                d.x += d.vx;
                d.y += d.vy;
                if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fill();
            }

            for (let i = 0; i < dotsCount; i++) {
                for (let j = i + 1; j < dotsCount; j++) {
                    let d1 = dots[i];
                    let d2 = dots[j];
                    let dist = Math.hypot(d1.x - d2.x, d1.y - d2.y);
                    if (dist < maxDistance) {
                        let alpha = (1 - dist / maxDistance) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(d1.x, d1.y);
                        ctx.lineTo(d2.x, d2.y);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateBg);
        }
        animateBg();

        /* БЫСТРЫЕ ДЕЙСТВИЯ — загрузка иконок из ярлыков */
        async function loadQuickActions() {
            const grid = document.getElementById('quick-actions-grid');
            if (!grid) return;
            grid.innerHTML = '';

            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'circle-btn';
                btn.title = `Ярлык ${i}`;
                btn.dataset.num = i;
                btn.onclick = () => launchLink(i);

                // Временно показываем цифру
                btn.innerHTML = `<span class="btn-fallback">${i}</span>`;

                // Пробуем загрузить иконку
                const img = new Image();
                img.src = `/api/links/${i}/icon`;
                img.alt = String(i);
                img.onload = () => {
                    btn.innerHTML = '';
                    btn.appendChild(img);
                };
                // onerror — ничего не делаем, цифра уже показана

                grid.appendChild(btn);
            }
        }

        async function launchLink(num) {
            try {
                const r = await fetch(`/api/links/${num}/launch`, { method: 'POST' });
                const data = await r.json();
                if (!data.success) console.error('Ошибка запуска:', data.error);
            } catch (err) {
                console.error(err);
            }
        }

        /* ОСТАЛЬНАЯ ЛОГИКА */
        function getNext7DaysNames() {
            const result = []; const today = new Date();
            for (let i = 1; i <= 7; i++) {
                const nextDate = new Date(); nextDate.setDate(today.getDate() + i);
                result.push(daysOfWeek[nextDate.getDay()]);
            }
            return result;
        }

        async function sendPlayerCmd(action) {
            try { await fetch(`/api/player/${action}`, { method: 'POST' }); fetchPlayerInfo(); } catch (err) { console.error(err); }
        }

        async function fetchPlayerInfo() {
            try {
                const response = await fetch('/api/player/info');
                const data = await response.json();
                document.getElementById('track-title').innerText = data.track;
                document.getElementById('play-btn').innerHTML = data.is_playing ? 
                    `<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>` : 
                    `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                document.getElementById('cover').style.backgroundImage = data.cover ? `url("${data.cover}")` : '';
            } catch (err) { console.error(err); }
        }

        function setActiveAsset(id, name) {
            activeAssetId = id;
            document.getElementById('chart-title-asset').innerText = `МОНИТОРИНГ: ${name}`;
            renderActiveChart();
        }

        function handleChartHover(event) {
            const container = document.getElementById('grid-lines-container');
            const rect = container.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const containerWidth = rect.width;
            if (containerWidth <= 0) return;
            let percent = mouseX / containerWidth;
            if (percent < 0) percent = 0;
            if (percent > 1) percent = 1;
            const closestIndex = Math.round(percent * 14);
            const slider = document.getElementById('chart-range-slider');
            slider.value = closestIndex;
            updateSliderPosition();
        }

        function handleChartLeave() {
            const tooltip = document.getElementById('chart-data-tooltip');
            const vLine = document.getElementById('slider-vertical-line');
            if (tooltip) tooltip.style.opacity = '0';
            if (vLine) vLine.style.opacity = '0';
        }

        function updateSliderPosition() {
            const slider = document.getElementById('chart-range-slider');
            const vLine = document.getElementById('slider-vertical-line');
            const tooltip = document.getElementById('chart-data-tooltip');
            const gridContainer = document.getElementById('grid-lines-container');
            if (!gridContainer || !tooltip) return;

            const index = parseInt(slider.value);
            const asset = allFinancialData[activeAssetId];
            const pct = (index / 14) * 100;

            if (vLine) { vLine.style.left = `${pct}%`; vLine.style.opacity = '1'; }

            const offsetLeft = gridContainer.offsetLeft;
            const width = gridContainer.clientWidth;
            const absoluteX = offsetLeft + (width * (pct / 100));
            tooltip.style.left = `${absoluteX}px`;

            if (pct > 82) {
                tooltip.style.transform = 'translate(-88%, 0)';
            } else if (pct < 15) {
                tooltip.style.transform = 'translate(-12%, 0)';
            } else {
                tooltip.style.transform = 'translate(-50%, 0)';
            }

            if (asset && asset.history && serverDates.length > 0) {
                const price = asset.history[index];
                const date = serverDates[index];
                const currencySign = asset.id === 'usd' || asset.id === 'eur' || asset.id === 'cny' || asset.id === 'sber' || asset.id === 'gazp' ? '₽' : '$';
                tooltip.innerText = `${date}: ${price} ${currencySign}`;
                if (index > 0) {
                    const prevPrice = asset.history[index - 1];
                    if (price > prevPrice) {
                        tooltip.style.color = '#00ff7b';
                        tooltip.style.borderColor = '#00ff7b';
                    } else if (price < prevPrice) {
                        tooltip.style.color = '#ff3b30';
                        tooltip.style.borderColor = '#ff3b30';
                    } else {
                        tooltip.style.color = '#ffffff';
                        tooltip.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                    }
                } else {
                    tooltip.style.color = '#ffffff';
                    tooltip.style.borderColor = 'rgba(255, 255, 255, 0.3)';
                }
                tooltip.style.opacity = '1';
            }
        }

        function renderActiveChart() {
            const asset = allFinancialData[activeAssetId];
            if (!asset || !asset.history || asset.history.length === 0) return;

            const history = asset.history;
            const firstPrice = history[0];
            const lastPrice = history[history.length - 1];
            const realMax = Math.max(...history);
            const realMin = Math.min(...history);
            const delta = realMax - realMin;

            let limitMax, limitMin;
            if (delta === 0) {
                const padding = realMax * 0.1 || 10;
                limitMax = realMax + padding;
                limitMin = Math.max(0, realMin - padding);
            } else {
                const buffer = delta * 0.1;
                limitMax = realMax + buffer;
                limitMin = Math.max(0, realMin - buffer);
            }
            limitMax = Math.ceil(limitMax);
            limitMin = Math.floor(limitMin);
            if (limitMax === limitMin) { limitMax += 1; limitMin = Math.max(0, limitMin - 1); }

            const yAxisEl = document.getElementById('chart-axis-y');
            const step = (limitMax - limitMin) / 4;
            yAxisEl.innerHTML = `
                <span>${limitMax}</span>
                <span>${Math.round(limitMin + step * 3)}</span>
                <span>${Math.round(limitMin + step * 2)}</span>
                <span>${Math.round(limitMin + step * 1)}</span>
                <span>${limitMin}</span>
            `;

            const isUp = lastPrice >= firstPrice;
            const chartColor = isUp ? '#00ff7b' : '#ff3b30';

            const svgCanvas = document.getElementById('chart-svg-canvas');
            const pathEl = document.getElementById('chart-path');
            const width = svgCanvas.clientWidth || 300;
            const height = svgCanvas.clientHeight || 130;
            const priceRange = limitMax - limitMin;

            const points = history.map((val, idx) => {
                const x = (idx / (history.length - 1)) * width;
                const y = height - (((val - limitMin) / priceRange) * height);
                return `${x},${y}`;
            });

            pathEl.setAttribute('d', points.length ? `M ${points.join(' L ')}` : '');
            pathEl.style.stroke = chartColor;
            pathEl.setAttribute('stroke', chartColor);
            handleChartLeave();
        }

        async function fetchSystemData() {
            try {
                const response = await fetch('/api/system/data');
                const data = await response.json();
                
                document.getElementById('temp-today').innerText = data.weather.current;
                
                const dayNames = getNext7DaysNames();
                let forecastHTML = '';
                for (let i = 0; i < 7; i++) {
                    forecastHTML += `<div class="week-item"><span class="day-name">${dayNames[i]}</span> <span class="day-temp">${data.weather.forecast[i] || '--°C'}</span></div>`;
                }
                document.getElementById('temp-week').innerHTML = forecastHTML;
                document.getElementById('noti-list').innerHTML = data.notifications.map(n => `<div class="noti-item">${n}</div>`).join('');

                if (data.dates) serverDates = data.dates;

                allFinancialData = {};
                if (data.currencies) data.currencies.forEach(c => { allFinancialData[c.id] = c; });
                if (data.stocks) data.stocks.forEach(s => { allFinancialData[s.id] = s; });

                const createCapsulesHTML = (items) => {
                    if (!items) return '';
                    return items.map(item => {
                        if (!item.history || item.history.length === 0) {
                            return `
                                <div class="finance-capsule" onclick="setActiveAsset('${item.id}', '${item.name}')">
                                    <span class="cap-name">${item.name}</span>
                                    <span class="cap-val">${item.value || '--'}</span>
                                </div>
                            `;
                        }
                        const first = item.history[0];
                        const last = item.history[item.history.length - 1];
                        const isUp = last >= first;
                        const pct = (((last - first) / first) * 100).toFixed(1);
                        const sign = isUp ? '▲ +' : '▼ ';
                        const colorClass = isUp ? 'capsule-up' : 'capsule-down';
                        return `
                            <div class="finance-capsule" onclick="setActiveAsset('${item.id}', '${item.name}')">
                                <span class="cap-name">${item.name}</span>
                                <span class="cap-val">${item.value}</span>
                                <span class="cap-change ${colorClass}">${sign}${pct}%</span>
                            </div>
                        `;
                    }).join('');
                };

                document.getElementById('currency-ticker').innerHTML = createCapsulesHTML(data.currencies);
                document.getElementById('currency-ticker-dup').innerHTML = createCapsulesHTML(data.currencies);
                document.getElementById('stock-ticker').innerHTML = createCapsulesHTML(data.stocks);
                document.getElementById('stock-ticker-dup').innerHTML = createCapsulesHTML(data.stocks);

                if (data.dates) {
                    document.getElementById('chart-axis-x').innerHTML = data.dates.map(date => `<span>${date}</span>`).join('');
                }

                renderActiveChart();
            } catch (err) { console.error(err); }
        }

        window.addEventListener('resize', () => { renderActiveChart(); });

        /* ЧАСЫ */
        const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
            document.getElementById('clock-date').textContent = `${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        loadQuickActions();
        fetchPlayerInfo();
        fetchSystemData();
        setInterval(fetchPlayerInfo, 1000); 
        setInterval(fetchSystemData, 3600000);
    </script>
</body>
</html>
